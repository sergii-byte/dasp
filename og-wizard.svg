<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#141413"/>
  <rect x="0" y="0" width="12" height="630" fill="#d97757"/>

  <!-- Logo block -->
  <g transform="translate(72, 80)">
    <rect width="64" height="64" rx="14" fill="#d97757"/>
    <text x="32" y="44" font-family="Inter, sans-serif" font-weight="700" font-size="28" fill="#faf9f5" text-anchor="middle">ES</text>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="200" font-family="Menlo, monospace" font-size="20" font-weight="600" fill="#d97757" letter-spacing="3">INTERACTIVE TOOL</text>

  <!-- Title -->
  <text x="72" y="295" font-family="Georgia, serif" font-size="92" font-weight="400" fill="#faf9f5">Decision</text>
  <text x="72" y="395" font-family="Georgia, serif" font-size="92" font-weight="400" fill="#faf9f5"><tspan fill="#d97757" font-style="italic">Wizard</tspan></text>

  <!-- Sub -->
  <text x="72" y="475" font-family="Inter, sans-serif" font-size="24" fill="#b0aea5">Inputs → SDD · Standard CDD · EDD · Reject</text>
  <text x="72" y="510" font-family="Inter, sans-serif" font-size="24" fill="#b0aea5">Triggered obligations only · statutory citations</text>

  <!-- Verdict pills demo -->
  <g transform="translate(72, 555)" font-family="Inter, sans-serif" font-size="14" font-weight="600">
    <rect x="0" y="0" width="80" height="36" rx="4" fill="#788c5d"/>
    <text x="40" y="23" fill="#fff" text-anchor="middle">SDD</text>
    <rect x="92" y="0" width="120" height="36" rx="4" fill="#6a9bcc"/>
    <text x="152" y="23" fill="#fff" text-anchor="middle">STANDARD CDD</text>
    <rect x="224" y="0" width="80" height="36" rx="4" fill="#b76629"/>
    <text x="264" y="23" fill="#fff" text-anchor="middle">EDD</text>
    <rect x="316" y="0" width="100" height="36" rx="4" fill="#a53321"/>
    <text x="366" y="23" fill="#fff" text-anchor="middle">REJECT</text>
  </g>

  <!-- URL -->
  <text x="1128" y="600" font-family="Menlo, monospace" font-size="18" fill="#5a5a55" text-anchor="end">salvadordaps.netlify.app/wizard</text>
</svg>
