  <!-- Logo block -->
  <g transform="translate(72, 80)">
    <rect width="64" height="64" rx="14" fill="#d97757"/>
    <text x="32" y="44" font-family="Inter, sans-serif" font-weight="700" font-size="28" fill="#faf9f5" text-anchor="middle">ES</text>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="200" font-family="Menlo, monospace" font-size="20" font-weight="600" fill="#b76629" letter-spacing="3">GUIDE 01 · LICENSING</text>

  <!-- Title -->
