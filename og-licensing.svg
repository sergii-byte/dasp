  <text x="72" y="385" font-family="Georgia, serif" font-size="84" font-weight="400" fill="#141413">in <tspan fill="#d97757" font-style="italic">El Salvador</tspan></text>

  <!-- Sub -->
  <text x="72" y="460" font-family="Inter, sans-serif" font-size="24" fill="#3a3a36">PSAD registration with CNAD under LEAD</text>
  <text x="72" y="495" font-family="Inter, sans-serif" font-size="24" fill="#3a3a36">D-643/2023 — five-stage timeline · costs · personnel</text>

