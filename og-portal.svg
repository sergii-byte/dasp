<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#e8e6dc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="12" height="630" fill="#d97757"/>

  <!-- Logo block -->
  <g transform="translate(72, 80)">
    <rect width="64" height="64" rx="14" fill="#141413"/>
    <text x="32" y="44" font-family="Inter, sans-serif" font-weight="700" font-size="28" fill="#faf9f5" text-anchor="middle">ES</text>
  </g>

  <!-- Brand line -->
  <text x="72" y="200" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#b0aea5" letter-spacing="2">EL SALVADOR DASP</text>

  <!-- Title -->
  <text x="72" y="290" font-family="Georgia, serif" font-size="78" font-weight="400" fill="#141413">Licensing &amp;</text>
  <text x="72" y="380" font-family="Georgia, serif" font-size="78" font-weight="400" fill="#141413"><tspan fill="#d97757" font-style="italic">AML Compliance</tspan></text>

  <!-- Sub -->
  <text x="72" y="455" font-family="Inter, sans-serif" font-size="26" fill="#3a3a36">Practitioner reference for Salvadoran</text>
  <text x="72" y="490" font-family="Inter, sans-serif" font-size="26" fill="#3a3a36">DASP registration and AML/CTF compliance</text>

  <!-- Footer pills -->
  <g transform="translate(72, 540)" font-family="Menlo, monospace" font-size="20" fill="#5a5a55">
    <rect x="0" y="0" width="180" height="38" rx="4" fill="#141413"/>
    <text x="90" y="25" fill="#faf9f5" text-anchor="middle">Two Guides</text>
    <rect x="200" y="0" width="170" height="38" rx="4" fill="#141413"/>
    <text x="285" y="25" fill="#faf9f5" text-anchor="middle">One Wizard</text>
    <rect x="390" y="0" width="190" height="38" rx="4" fill="#141413"/>
    <text x="485" y="25" fill="#faf9f5" text-anchor="middle">One Playbook</text>
  </g>

  <!-- Diagonal decorator -->
  <g opacity="0.08" transform="translate(900, 80)">
    <circle cx="120" cy="120" r="220" fill="#788c5d"/>
    <circle cx="220" cy="280" r="160" fill="#6a9bcc"/>
    <circle cx="80" cy="320" r="100" fill="#d97757"/>
  </g>

  <!-- URL -->
  <text x="1128" y="600" font-family="Menlo, monospace" font-size="18" fill="#8a8a85" text-anchor="end">salvadordaps.netlify.app</text>
